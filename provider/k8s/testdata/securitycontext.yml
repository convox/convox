services:
  secured:
    build: .
    port: 8080
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
      seccompProfile: RuntimeDefault
  plain:
    build: .
    port: 8080
  legacy:
    build: .
    port: 8080
    privileged: true
  emptycaps:
    build: .
    port: 8080
    securityContext:
      capabilities: {}
  zerouid:
    build: .
    port: 8080
    securityContext:
      runAsUser: 0
      readOnlyRootFilesystem: false
timers:
  secured-timer:
    service: secured
    schedule: "*/5 * * * *"
    command: ./run.sh
