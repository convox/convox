name: lint
on: pull_request

jobs:
  golangci-lint:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - name: Install libudev-dev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m --new-from-rev=${{ github.event.pull_request.base.sha }}

  govulncheck:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - name: Install libudev-dev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  terraform-lint:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: setup tflint
        uses: terraform-linters/setup-tflint@v4
      - name: init tflint
        run: tflint --init
      - name: terraform validate
        continue-on-error: true
        run: |
          for dir in $(find terraform -name '*.tf' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u); do
            echo "==> terraform validate $dir"
            (cd "$dir" && terraform init -backend=false -input=false > /dev/null 2>&1 && terraform validate) || echo "  ⚠ validate failed for $dir (pre-existing)"
          done
      - name: tflint
        run: |
          for dir in $(find terraform -name '*.tf' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u); do
            echo "==> tflint $dir"
            (cd "$dir" && tflint --config "$(git rev-parse --show-toplevel)/.tflint.hcl")
          done

  terraform-security:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install checkov
        run: pip install checkov
      - name: checkov
        run: checkov -d terraform --framework terraform --config-file .checkov.yml
